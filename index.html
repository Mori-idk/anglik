        const quizContainer = document.getElementById('quiz-container');

        // Generowanie HTML dla pytań
        questions.forEach((q, index) => {
            const questionDiv = document.createElement('div');
            questionDiv.className = 'question-container';
            questionDiv.innerHTML = `
                <span class="root-word">(${q.root})</span>
                ${q.textBefore} 
                <input type="text" id="input-${index}" data-answer="${q.answer}" autocomplete="off"> 
                ${q.textAfter}
                <span id="feedback-${index}" class="feedback"></span>
            `;
            quizContainer.appendChild(questionDiv);
        });

        // Funkcja sprawdzająca odpowiedzi
        function checkAnswers() {
            questions.forEach((q, index) => {
                const inputElement = document.getElementById(`input-${index}`);
                const feedbackElement = document.getElementById(`feedback-${index}`);
                const userAnswer = inputElement.value.trim().toLowerCase();
                const correctAnswer = q.answer.toLowerCase();

                // Czyszczenie poprzednich stylów
                inputElement.classList.remove('correct', 'incorrect');
                feedbackElement.classList.remove('correct-text', 'incorrect-text');
                
                if (userAnswer === correctAnswer) {
                    inputElement.classList.add('correct');
                    feedbackElement.textContent = "✔ Dobrze!";
                    feedbackElement.classList.add('correct-text');
                } else {
                    inputElement.classList.add('incorrect');
                    if (userAnswer === "") {
                        feedbackElement.textContent = "✖ Brak odpowiedzi.";
                    } else {
                        feedbackElement.textContent = "✖ Źle. Poprawna odpowiedź to: " + q.answer;
                    }
                    feedbackElement.classList.add('incorrect-text');
                }
            });
        }
